{% extends "owner/base_owner.html" %}

{% block owner_content %}
<div class="owner-page-heading">
  <div>
    <p class="owner-kicker">Account</p>
    <h1>Change password</h1>
  </div>
  <a href="{% url 'owner_account' %}" class="owner-secondary">Back to account</a>
</div>

<form method="post" class="owner-card owner-form-grid">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}
    <label>
      {{ field.label }}
      {{ field }}
      {{ field.errors }}
    </label>
  {% endfor %}
  <button type="submit" class="owner-primary">Update password</button>
</form>
{% endblock %}
